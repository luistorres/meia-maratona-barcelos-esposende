        let startIdx = i, endIdx = i;
        while (startIdx > 0 && data[i].distKm - data[startIdx - 1].distKm < WINDOW / 2) startIdx--;
        while (endIdx < data.length - 1 && data[endIdx + 1].distKm - data[i].distKm < WINDOW / 2) endIdx++;
        const dDist = data[endIdx].distKm - data[startIdx].distKm;
        const dElev = data[endIdx].elevation - data[startIdx].elevation;
        const grade = dDist > 0 ? (dElev / (dDist * 1000)) * 100 : 0;
        return { ...pt, grade: Math.max(-15, Math.min(15, grade)) };
      });
    }

    const STATS = {
      totalDistanceKm: 21,
      minElevation: 4,
      maxElevation: 86,
      totalAscent: 276,
      totalDescent: 311,
    };

    // ─── ElevationChart ────────────────────────────────────────
    function ElevationChart({ data, width, height }) {
      const [hover, setHover] = React.useState(null);
      const svgRef = React.useRef(null);

      const padding = { top: 20, right: 20, bottom: 35, left: 45 };
      const plotW = width - padding.left - padding.right;
      const plotH = height - padding.top - padding.bottom;

      const maxDist = 21;
      const minElev = 0;
      const maxElev = 100;

      const x = (d) => padding.left + (d / maxDist) * plotW;
      const y = (e) => padding.top + plotH - ((e - minElev) / (maxElev - minElev)) * plotH;

      const handlePointerMove = (e) => {
        const svg = svgRef.current;
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const mouseX = clientX - rect.left;
        const svgX = (mouseX / rect.width) * width;
        const distKm = ((svgX - padding.left) / plotW) * maxDist;
        let nearest = data[0];
        let minDiff = Infinity;
        for (const pt of data) {
          const diff = Math.abs(pt.distKm - distKm);
          if (diff < minDiff) { minDiff = diff; nearest = pt; }
        }
        if (distKm >= 0 && distKm <= maxDist) setHover(nearest);
      };

      return (
        <div style={{ position: 'relative' }}>
          <svg
            ref={svgRef}
            viewBox={`0 0 ${width} ${height}`}
            style={{ width: '100%', height: 'auto', display: 'block' }}
            onPointerMove={handlePointerMove}
            onPointerLeave={() => setHover(null)}
          >
            {/* Horizontal grid lines */}
            {[0, 25, 50, 75, 100].map(elev => (
              <line key={elev}
                x1={padding.left} x2={width - padding.right}
                y1={y(elev)} y2={y(elev)}
                stroke="rgba(255,255,255,0.06)" strokeWidth="1" />
            ))}

            {/* Colored fill segments */}
            {data.slice(0, -1).map((pt, i) => {
              const next = data[i + 1];
              const color = gradeToColor((pt.grade + next.grade) / 2);
              return (
                <path key={`fill-${i}`}
                  d={`M${x(pt.distKm)},${y(pt.elevation)} L${x(next.distKm)},${y(next.elevation)} L${x(next.distKm)},${y(0)} L${x(pt.distKm)},${y(0)} Z`}
                  fill={color} opacity="0.35" />
              );
            })}

            {/* Colored stroke segments */}
            {data.slice(0, -1).map((pt, i) => {
              const next = data[i + 1];
              const color = gradeToColor((pt.grade + next.grade) / 2);
              return (
                <line key={`line-${i}`}
                  x1={x(pt.distKm)} y1={y(pt.elevation)}
                  x2={x(next.distKm)} y2={y(next.elevation)}
                  stroke={color} strokeWidth="2.5" strokeLinecap="round" />
              );
            })}

            {/* Y-axis labels */}
            {[0, 25, 50, 75, 100].map(elev => (
              <text key={`y-${elev}`}
                x={padding.left - 8} y={y(elev) + 4}
                textAnchor="end" fill="rgba(255,255,255,0.35)"
                fontSize="10" fontFamily="Inter, sans-serif">{elev}m</text>
            ))}

            {/* X-axis labels */}
            {[0, 5, 10, 15, 21].map(km => (
              <text key={`x-${km}`}
                x={x(km)} y={height - 8}
                textAnchor="middle" fill="rgba(255,255,255,0.35)"
                fontSize="10" fontFamily="Inter, sans-serif">{km}</text>
            ))}

            {/* X-axis unit */}
            <text x={width - padding.right} y={height - 8}
              textAnchor="end" fill="rgba(255,255,255,0.2)"
              fontSize="9" fontFamily="Inter, sans-serif">km</text>

            {/* Waypoint dots */}
            {data.filter(p => p.annotation).map((p, i) => {
              const isStart = p.annotation.includes('Partida');
              const isFinish = p.annotation.includes('Chegada');
              const color = isStart ? '#22c55e' : isFinish ? '#ef4444' : '#fff';
              const r = (isStart || isFinish) ? 5 : 3;
              return (
                <g key={`wp-${i}`}>
                  <circle cx={x(p.distKm)} cy={y(p.elevation)} r={r + 2}
                    fill={color} opacity="0.2" />
                  <circle cx={x(p.distKm)} cy={y(p.elevation)} r={r}
                    fill={color} stroke="#0a0a0f" strokeWidth="1.5" />
                </g>
              );
            })}

            {/* Highest point label */}
            {(() => {
              const hp = data.reduce((max, p) => p.elevation > max.elevation ? p : max);
              return (
                <text x={x(hp.distKm)} y={y(hp.elevation) - 10}
                  textAnchor="middle" fill="#f59e0b"
                  fontSize="10" fontWeight="700" fontFamily="Inter, sans-serif">
                  {hp.elevation}m
                </text>
              );
            })()}

            {/* PARTIDA / CHEGADA labels */}
            {data.filter(p => p.annotation && (p.annotation.includes('Partida') || p.annotation.includes('Chegada'))).map((p, i) => {
              const isStart = p.annotation.includes('Partida');
              return (
                <text key={`label-${i}`}
                  x={x(p.distKm)} y={y(p.elevation) - 12}
                  textAnchor={isStart ? 'start' : 'end'}
                  fill={isStart ? '#22c55e' : '#ef4444'}
                  fontSize="9" fontWeight="700" fontFamily="Inter, sans-serif"
                  letterSpacing="0.06em">
                  {isStart ? 'PARTIDA' : 'CHEGADA'}
                </text>
              );
            })}

            {/* Hover cursor line + dot */}
            {hover && (
              <g>
                <line
                  x1={x(hover.distKm)} x2={x(hover.distKm)}
                  y1={padding.top} y2={padding.top + plotH}
                  stroke="rgba(255,255,255,0.2)" strokeWidth="1" strokeDasharray="3 3" />
                <circle cx={x(hover.distKm)} cy={y(hover.elevation)} r="5"
                  fill={gradeToColor(hover.grade)} stroke="#0a0a0f" strokeWidth="2" />
              </g>
            )}
          </svg>

          {/* Hover tooltip */}
          {hover && (
            <div style={{
              position: 'absolute',
              left: `clamp(10px, calc(${(hover.distKm / maxDist) * 100}% - 60px), calc(100% - 140px))`,
              top: 8,
              background: 'rgba(15,15,25,0.92)',
              border: '1px solid rgba(255,255,255,0.1)',
              borderRadius: 10,
              padding: '8px 12px',
              pointerEvents: 'none',
              backdropFilter: 'blur(12px)',
              minWidth: 120,
            }}>
              {hover.annotation && (
                <div style={{ fontSize: 10, fontWeight: 600, color: '#60a5fa', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.04em' }}>
                  {hover.annotation}
                </div>
              )}
              <div style={{ fontSize: 12, color: '#e2e8f0', fontWeight: 500 }}>
                Km {hover.distKm.toFixed(1)}
              </div>
              <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 2 }}>
                Alt: <span style={{ color: '#e2e8f0', fontWeight: 500 }}>{hover.elevation}m</span>
              </div>
              <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 2, display: 'flex', alignItems: 'center', gap: 4 }}>
                <span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 2, background: gradeToColor(hover.grade) }}></span>
                <span style={{ color: gradeToColor(hover.grade), fontWeight: 600 }}>
                  {hover.grade > 0 ? '+' : ''}{hover.grade.toFixed(1)}%
                </span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── GradientLegend ────────────────────────────────────────
    function GradientLegend() {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '12px 0', flexWrap: 'wrap' }}>
          <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.3)', textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 600 }}>
            Declive
          </span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 0, flex: 1, minWidth: 200 }}>
            {GRADE_COLORS.map((g, i) => (
              <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                <div style={{
                  width: '100%', height: 6, background: g.color,
                  borderRadius: i === 0 ? '3px 0 0 3px' : i === GRADE_COLORS.length - 1 ? '0 3px 3px 0' : 0,
                }} />
                <span style={{ fontSize: 8, color: 'rgba(255,255,255,0.3)', marginTop: 3, whiteSpace: 'nowrap' }}>{g.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── App ───────────────────────────────────────────────────
    function App() {
      const data = computeGrades(profileData);
      const isMobile = window.innerWidth < 640;

      // Expose for Leaflet script
      window.__mapData = data;

      const annotatedPoints = data.filter(p => p.annotation && KEY_ANNOTATIONS.includes(p.annotation));

      return (
        <div style={{ width: '100%' }}>
          {/* Header */}
          <div style={{ marginBottom: isMobile ? 24 : 32 }}>
            <h1 style={{
              fontSize: isMobile ? 28 : 36,
              fontWeight: 800,
              color: '#f1f5f9',
              letterSpacing: '-0.03em',
              lineHeight: 1.1,
              marginBottom: 6,
            }}>
              Meia Maratona
            </h1>
            <p style={{
              fontSize: isMobile ? 13 : 15,
              color: 'rgba(255,255,255,0.4)',
              letterSpacing: '0.01em',
              marginBottom: 12,
            }}>
              Barcelos → Esposende
            </p>
            {/* Inline stats */}
            <div style={{
              display: 'flex',
              flexWrap: 'wrap',
              gap: isMobile ? '4px 16px' : '4px 24px',
              fontSize: isMobile ? 13 : 14,
              color: 'rgba(255,255,255,0.35)',
            }}>
              <span><strong style={{ color: '#e2e8f0', fontWeight: 600 }}>{STATS.totalDistanceKm}</strong> km</span>
              <span><strong style={{ color: '#22c55e', fontWeight: 600 }}>+{STATS.totalAscent}</strong> m</span>
              <span><strong style={{ color: '#ef4444', fontWeight: 600 }}>-{STATS.totalDescent}</strong> m</span>
              <span><strong style={{ color: 'rgba(255,255,255,0.6)', fontWeight: 600 }}>{STATS.minElevation}–{STATS.maxElevation}</strong> m alt.</span>
            </div>
          </div>

          {/* Elevation Profile */}
          <div style={{
            background: 'rgba(255,255,255,0.02)',
            border: '1px solid rgba(255,255,255,0.06)',
            borderRadius: isMobile ? 14 : 20,
            padding: isMobile ? '12px 8px 8px' : '20px 16px 12px',
          }}>
            <ElevationChart data={data} width={900} height={380} />
            <GradientLegend />
          </div>

          {/* Waypoints list */}
          <div style={{
            marginTop: isMobile ? 16 : 24,
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr',
            gap: isMobile ? 4 : 6,
            fontSize: 11,
            color: 'rgba(255,255,255,0.45)',
          }}>
            {annotatedPoints.map((p, i) => {
              const isStart = p.annotation.includes('Partida');
              const isFinish = p.annotation.includes('Chegada');
              const isReturn = p.annotation.includes('retorno') || p.annotation.includes('volta') || p.annotation.includes('subida');
              const dotColor = isStart ? '#22c55e' : isFinish ? '#ef4444' : isReturn ? '#a78bfa' : '#60a5fa';
              return (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '3px 0' }}>
                  <div style={{ width: 5, height: 5, borderRadius: '50%', background: dotColor, flexShrink: 0 }} />
                  <span style={{ fontWeight: 500, color: 'rgba(255,255,255,0.55)' }}>{p.distKm.toFixed(1)}</span>
                  <span style={{ color: 'rgba(255,255,255,0.2)' }}>—</span>
                  <span>{p.annotation}</span>
                </div>
              );
            })}
          </div>

          {/* Map */}
          <div style={{
            marginTop: isMobile ? 20 : 28,
            background: 'rgba(255,255,255,0.02)',
            border: '1px solid rgba(255,255,255,0.06)',
            borderRadius: isMobile ? 14 : 20,
            overflow: 'hidden',
            padding: 4,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 14px 6px' }}>
              <span style={{
                fontSize: 12, fontWeight: 600,
                color: 'rgba(255,255,255,0.4)',
                textTransform: 'uppercase',
                letterSpacing: '0.06em',
              }}>
                Mapa do Percurso
              </span>
            </div>
            <div id="route-map" style={{ height: isMobile ? 320 : 480, borderRadius: 14 }}></div>
          </div>

          {/* Footer */}
          <div style={{
            marginTop: 16,
            textAlign: 'center',
            fontSize: 10,
            color: 'rgba(255,255,255,0.12)',
          }}>
            Elevacao: SRTM 90m via OpenTopoData · Percurso oficial: Meia Maratona do Cavado 2026
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
  // ─── Leaflet Map ───────────────────────────────────────────
  setTimeout(function() {
    var mapData = window.__mapData;

    var map = L.map('route-map', {
      scrollWheelZoom: true,
      attributionControl: true,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    if (mapData && mapData.length > 1) {
      // Shadow layer for depth (desktop only)
      if (window.innerWidth >= 640) {
        var allCoords = mapData.map(function(p) { return [p.lat, p.lon]; });
        L.polyline(allCoords, { color: '#000', weight: 7, opacity: 0.3, smoothFactor: 1 }).addTo(map);
      }

      // Gradient-colored route segments
      for (var i = 0; i < mapData.length - 1; i++) {
        var p1 = mapData[i];
        var p2 = mapData[i + 1];
        var avgGrade = (p1.grade + p2.grade) / 2;
        L.polyline([[p1.lat, p1.lon], [p2.lat, p2.lon]], {
          color: gradeToColor(avgGrade),
          weight: 4,
          opacity: 0.85,
          smoothFactor: 1,
        }).addTo(map);
      }
    }

    var MAP_WAYPOINTS = [
      {lat:41.53282,lon:-8.61911,n:"Partida",km:0.1,e:42,type:"start"},
      {lat:41.53930,lon:-8.60828,n:"Estação de Barcelos",km:2.1,e:24,type:"return"},
      {lat:41.53453,lon:-8.60604,n:"Central de Camionagem",km:2.9,e:16,type:"return"},
      {lat:41.53953,lon:-8.61215,n:"R. Pedro Álvares Cabral",km:4.4,e:33,type:"point"},
      {lat:41.53195,lon:-8.62098,n:"R. Cândido dos Reis",km:6.2,e:41,type:"point"},
      {lat:41.52886,lon:-8.64318,n:"R. de São Simão",km:8.4,e:45,type:"point"},
      {lat:41.53130,lon:-8.77818,n:"R. Sra. da Saúde",km:20.5,e:7,type:"point"},
      {lat:41.53264,lon:-8.78166,n:"Chegada",km:20.9,e:5,type:"finish"},
    ];

    MAP_WAYPOINTS.forEach(function(wp) {
      var color = wp.type === 'start' ? '#22c55e'
        : wp.type === 'finish' ? '#ef4444'
        : wp.type === 'return' ? '#a78bfa'
        : '#60a5fa';
      var radius = (wp.type === 'start' || wp.type === 'finish') ? 7 : 5;

      L.circleMarker([wp.lat, wp.lon], {
        radius: radius + 4,
        fillColor: color, fillOpacity: 0.15, stroke: false,
      }).addTo(map);

      var marker = L.circleMarker([wp.lat, wp.lon], {
        radius: radius,
        fillColor: color, fillOpacity: 1,
        color: '#0a0a0f', weight: 2,
      }).addTo(map);

      marker.bindPopup(
        '<div class="wp-label">' + wp.n + '</div>' +
        '<div class="wp-detail">Km ' + wp.km.toFixed(1) + ' · Alt: <strong>' + wp.e + ' m</strong></div>',
        { closeButton: false, offset: [0, -5] }
      );
      marker.on('mouseover', function() { this.openPopup(); });
      marker.on('mouseout', function() { this.closePopup(); });

      if (wp.type === 'start' || wp.type === 'finish') {
        L.marker([wp.lat, wp.lon], {
          icon: L.divIcon({
            className: '',
            html: '<div style="background:' + color + ';color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap;letter-spacing:0.06em;box-shadow:0 2px 8px rgba(0,0,0,0.3)">' +
              (wp.type === 'start' ? 'PARTIDA' : 'CHEGADA') + '</div>',
            iconSize: null,
            iconAnchor: [30, -12],
          }),
          interactive: false,
        }).addTo(map);
      }
    });

    // Fit bounds to route
    var boundsCoords = mapData
      ? mapData.map(function(p) { return [p.lat, p.lon]; })
      : MAP_WAYPOINTS.map(function(w) { return [w.lat, w.lon]; });
    map.fitBounds(L.polyline(boundsCoords).getBounds().pad(0.05));
  }, 600);
  </script>
</body>
