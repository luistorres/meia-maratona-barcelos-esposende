      }).addTo(map);

      // Main marker
      var marker = L.circleMarker([wp.lat, wp.lon], {
        radius: radius,
        fillColor: color,
        fillOpacity: 1,
        color: "#0a0a0f",
        weight: 2,
      }).addTo(map);

      var label = wp.type === "start" ? "PARTIDA"
        : wp.type === "finish" ? "CHEGADA"
        : wp.n;

      marker.bindPopup(
        '<div class="wp-label">' + label + '</div>' +
        '<div class="wp-detail">Km ' + wp.km.toFixed(1) + ' · Alt: <strong>' + wp.e + ' m</strong></div>',
        { closeButton: false, offset: [0, -5] }
      );

      marker.on("mouseover", function() { this.openPopup(); });
      marker.on("mouseout", function() { this.closePopup(); });

      // Permanent label for start and finish
      if (wp.type === "start" || wp.type === "finish") {
        L.marker([wp.lat, wp.lon], {
          icon: L.divIcon({
            className: "",
            html: '<div style="background:' + color + ';color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap;letter-spacing:0.06em;box-shadow:0 2px 8px rgba(0,0,0,0.3)">' +
              (wp.type === "start" ? "PARTIDA" : "CHEGADA") + '</div>',
            iconSize: null,
            iconAnchor: [30, -12],
          }),
          interactive: false,
        }).addTo(map);
      }
    });

    // Fit bounds
    map.fitBounds(L.polyline(ROUTE_COORDS).getBounds().pad(0.05));
  }, 500);
  </script>
</body>
</html>
